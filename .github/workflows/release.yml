name: Release

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME}"
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use x.y.z format. Got: ${version}" >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Require Homebrew tap token
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${HOMEBREW_TAP_TOKEN}" ]]; then
            echo "Set the HOMEBREW_TAP_TOKEN secret with write access to qkdxorjs1002/homebrew-tap." >&2
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Sync package versions
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          version = os.environ["RELEASE_VERSION"]

          pyproject = Path("tapl/pyproject.toml")
          pyproject_text = pyproject.read_text()
          pyproject_text, pyproject_count = re.subn(
              r'(?m)^version = "[^"]+"$',
              f'version = "{version}"',
              pyproject_text,
              count=1,
          )
          if pyproject_count != 1:
              raise SystemExit("Could not update tapl/pyproject.toml version")
          pyproject.write_text(pyproject_text)

          package_json = Path("vscode-extension/package.json")
          package_data = json.loads(package_json.read_text())
          package_data["version"] = version
          package_json.write_text(json.dumps(package_data, indent=2) + "\n")
          PY

      - name: Build Python wheel
        working-directory: tapl
        shell: bash
        run: |
          set -euo pipefail

          python -m pip install --upgrade pip build
          python -m build --wheel --outdir ../release-dist

      - name: Build VS Code extension package
        working-directory: vscode-extension
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          npm install --package-lock=false
          npm run compile
          npm exec -- vsce package \
            --allow-missing-repository \
            --out "../release-dist/tapl-workflow-viewer-${RELEASE_VERSION}.vsix"

      - name: Prepare release assets
        id: assets
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          wheel_path="release-dist/taplctl-${RELEASE_VERSION}-py3-none-any.whl"
          vsix_path="release-dist/tapl-workflow-viewer-${RELEASE_VERSION}.vsix"

          test -f "${wheel_path}"
          test -f "${vsix_path}"

          wheel_name="$(basename "${wheel_path}")"
          wheel_sha256="$(sha256sum "${wheel_path}" | awk '{print $1}')"
          wheel_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${wheel_name}"

          echo "wheel_name=${wheel_name}" >> "${GITHUB_OUTPUT}"
          echo "wheel_sha256=${wheel_sha256}" >> "${GITHUB_OUTPUT}"
          echo "wheel_url=${wheel_url}" >> "${GITHUB_OUTPUT}"

          ls -lh release-dist

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" release-dist/* --clobber
          else
            gh release create "${RELEASE_TAG}" release-dist/* \
              --title "taplctl ${RELEASE_TAG}" \
              --generate-notes
          fi

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: qkdxorjs1002/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update taplctl Homebrew package
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          WHEEL_SHA256: ${{ steps.assets.outputs.wheel_sha256 }}
          WHEEL_URL: ${{ steps.assets.outputs.wheel_url }}
        shell: bash
        run: |
          set -euo pipefail

          brew_files=()
          if [[ -f "homebrew-tap/Formula/taplctl.rb" ]]; then
            brew_files+=("homebrew-tap/Formula/taplctl.rb")
          elif [[ -f "homebrew-tap/Casks/taplctl.rb" ]]; then
            brew_files+=("homebrew-tap/Casks/taplctl.rb")
          fi
          if [[ -f "homebrew-tap/Formula/taplctl-semantic.rb" ]]; then
            brew_files+=("homebrew-tap/Formula/taplctl-semantic.rb")
          fi

          if [[ "${#brew_files[@]}" -eq 0 ]]; then
            echo "Could not find Formula/taplctl.rb or Casks/taplctl.rb in qkdxorjs1002/homebrew-tap." >&2
            exit 1
          fi

          ruby "${brew_files[@]}" <<'RUBY'
          files = ARGV
          version = ENV.fetch("RELEASE_VERSION")
          wheel_url = ENV.fetch("WHEEL_URL")
          wheel_sha256 = ENV.fetch("WHEEL_SHA256")

          def replacement_line(line, content)
            line.end_with?("\n") ? "#{content}\n" : content
          end

          def update_formula(file, version, wheel_url, wheel_sha256)
            semantic = File.basename(file) == "taplctl-semantic.rb"
            text = File.read(file)
            lines = text.lines

            version_index = lines.index { |line| line.match?(/^(\s*)version\s+["'][^"']+["'](.*)$/) }
            raise "Could not update version in #{file}" unless version_index

            version_match = lines[version_index].match(/^(\s*)version\s+["'][^"']+["'](.*)$/)
            lines[version_index] = replacement_line(
              lines[version_index],
              "#{version_match[1]}version \"#{version}\"#{version_match[2]}",
            )

            url_index = lines.index { |line| line.match?(/^(\s*)url\s+["'][^"']+["'](.*)$/) }
            raise "Could not update url in #{file}" unless url_index

            url_match = lines[url_index].match(/^(\s*)url\s+["'][^"']+["'](.*)$/)
            url_indent = url_match[1]
            lines[url_index] = replacement_line(
              lines[url_index],
              "#{url_indent}url \"#{wheel_url}\"",
            )

            sha_index = lines.index { |line| line.match?(/^#{Regexp.escape(url_indent)}sha256\b/) }
            sha_line = "#{url_indent}sha256 \"#{wheel_sha256}\""
            if sha_index
              lines[sha_index] = replacement_line(lines[sha_index], sha_line)
            else
              sha_insert_index = version_index > url_index ? version_index + 1 : url_index + 1
              lines.insert(sha_insert_index, "#{sha_line}\n")
            end

            install_start = lines.index { |line| line.match?(/^(\s*)def install\s*$/) }
            raise "Could not find install block in #{file}" unless install_start

            install_indent = lines[install_start].match(/^(\s*)/)[1]
            install_end = ((install_start + 1)...lines.length).find do |index|
              lines[index].match?(/^#{Regexp.escape(install_indent)}end\s*$/)
            end
            raise "Could not find end of install block in #{file}" unless install_end

            if semantic
              lines[install_start..install_end] = [
                "#{install_indent}def install\n",
                "#{install_indent}  wheel = Pathname.glob(\"*.whl\").first\n",
                "#{install_indent}  raise \"Could not find taplctl wheel\" unless wheel\n",
                "\n",
                "#{install_indent}  wheelhouse = buildpath/\"wheelhouse\"\n",
                "#{install_indent}  wheelhouse.mkpath\n",
                "#{install_indent}  resources.each do |resource|\n",
                "#{install_indent}    resource.stage { wheelhouse.install Dir[\"*.whl\"] }\n",
                "#{install_indent}  end\n",
                "\n",
                "#{install_indent}  virtualenv_create(libexec, \"python3.12\", system_site_packages: false)\n",
                "#{install_indent}  system \"python3.12\", \"-m\", \"pip\", \"--python=\#{libexec}/bin/python\", \"install\",\n",
                "#{install_indent}         \"--no-index\", \"--find-links=\#{wheelhouse}\", \"--no-compile\", wheel\n",
                "#{install_indent}  bin.install_symlink libexec/\"bin/taplctl\"\n",
                "#{install_indent}end\n",
              ]
            else
              lines[install_start..install_end] = [
                "#{install_indent}def install\n",
                "#{install_indent}  wheel = Pathname.glob(\"*.whl\").first\n",
                "#{install_indent}  raise \"Could not find taplctl wheel\" unless wheel\n",
                "\n",
                "#{install_indent}  venv = virtualenv_create(libexec, \"python3.12\", system_site_packages: false)\n",
                "#{install_indent}  venv.pip_install_and_link wheel\n",
                "#{install_indent}end\n",
              ]
            end

            File.write(file, lines.join)
          end

          files.each { |file| update_formula(file, version, wheel_url, wheel_sha256) }
          RUBY

          tap_paths=()
          for brew_file in "${brew_files[@]}"; do
            tap_paths+=("${brew_file#homebrew-tap/}")
          done

          git -C homebrew-tap config user.name "github-actions[bot]"
          git -C homebrew-tap config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C homebrew-tap add "${tap_paths[@]}"

          if git -C homebrew-tap diff --cached --quiet; then
            echo "Homebrew tap is already up to date."
            exit 0
          fi

          git -C homebrew-tap commit -m "taplctl ${RELEASE_VERSION}"
          git -C homebrew-tap push
