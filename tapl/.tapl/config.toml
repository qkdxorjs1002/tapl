[search]
# Search mode: semantic, bm25, word, or hybrid.
mode = "hybrid"

# Default maximum number of search results returned by taplctl search.
max_results = 7

# Hybrid search blends semantic rank and BM25 rank.
# 0.65 keeps concept search dominant while preserving exact keyword matches.
hybrid_semantic_ratio = 0.65

# Semantic provider: auto, daemon, or local.
# auto uses searchd when it is already running, then falls back to local loading.
semantic_provider = "auto"

# 0 disables model unload. The default keeps the model warm for 30 minutes after the last search.
searchd_model_idle_timeout_seconds = 1800

[plan-task-execute]
use_level_subagent = true

# Aggressiveness: minimal, auto, or force.
level_subagent_aggressiveness = "auto"

# Plan detail: minimal, less_detailed, detailed, or very_detailed.
plan_detail = "detailed"

# Task split granularity: minimal, less_granular, granular, or very_granular.
task_granularity = "granular"

# When true, executable tasks require recorded user approval before durable edits.
require_execution_approval = true
